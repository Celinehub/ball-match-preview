<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Match 3D - Square (512x512)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .cover { width: 512px; height: 512px; background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); position: relative; overflow: hidden; }
        .grid { display: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(40px); animation: pulse 4s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.1); } }
        .orb-1 { width: 200px; height: 200px; background: rgba(255,0,255,0.6); top: -30px; right: -30px; }
        .orb-2 { width: 180px; height: 180px; background: rgba(0,255,255,0.5); bottom: -20px; left: -20px; animation-delay: 1s; }
        .orb-3 { width: 150px; height: 150px; background: rgba(191,0,255,0.5); top: 40%; left: 30%; animation-delay: 2s; }
        .content { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .balls { display: flex; justify-content: center; align-items: center; margin-bottom: 30px; position: relative; height: 200px; width: 320px; }
        .ball { width: 80px; height: 80px; border-radius: 50%; position: absolute; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .ball-red { background: radial-gradient(circle at 35% 35%, #ff4d6d, #cc0033); box-shadow: 0 0 30px rgba(255,77,109,0.8), 0 0 60px rgba(255,77,109,0.5), inset -5px -5px 15px rgba(0,0,0,0.4), inset 5px 5px 15px rgba(255,255,255,0.3); animation: float 3s ease-in-out infinite; animation-delay: 0s; top: 0; left: 50%; margin-left: -40px; }
        .ball-blue { background: radial-gradient(circle at 35% 35%, #4de1ff, #0066cc); box-shadow: 0 0 30px rgba(77,225,255,0.8), 0 0 60px rgba(77,225,255,0.5), inset -5px -5px 15px rgba(0,0,0,0.4), inset 5px 5px 15px rgba(255,255,255,0.3); animation: float 3s ease-in-out infinite; animation-delay: 0.5s; bottom: 0; left: 5%; }
        .ball-yellow { background: radial-gradient(circle at 35% 35%, #ffff4d, #cccc00); box-shadow: 0 0 30px rgba(255,255,77,0.8), 0 0 60px rgba(255,255,77,0.5), inset -5px -5px 15px rgba(0,0,0,0.4), inset 5px 5px 15px rgba(255,255,255,0.3); animation: float 3s ease-in-out infinite; animation-delay: 1s; bottom: 0; right: 5%; }
        .title-main { font-size: 55px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 40px #ff00ff; margin-bottom: 5px; font-family: 'Arial Black', sans-serif; }
        .title-sub { font-size: 28px; font-weight: 700; color: #00ffff; text-transform: uppercase; letter-spacing: 8px; text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; margin-bottom: 15px; font-family: 'Arial Black', sans-serif; }
        .tagline { font-size: 16px; color: rgba(255,255,255,0.9); letter-spacing: 2px; text-transform: uppercase; font-family: Arial, sans-serif; }
        .light-strip { position: absolute; height: 2px; background: linear-gradient(90deg, transparent, #ff00ff, transparent); width: 400px; left: 50%; transform: translateX(-50%); animation: glow 2s ease-in-out infinite; }
        @keyframes glow { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .strip-top { top: 30px; }
        .strip-bottom { bottom: 30px; }
    </style>
</head>
<body>
    <div class="cover">
        <div class="grid"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="light-strip strip-top"></div>
        <div class="content">
            <div class="balls">
                <div class="ball ball-red"></div>
                <div class="ball ball-blue"></div>
                <div class="ball ball-yellow"></div>
            </div>
            <div class="title-main">Ball Match</div>
            <div class="title-sub">3D</div>
            <div class="tagline">Match 3 to Win</div>
        </div>
        <div class="light-strip strip-bottom"></div>
    </div>
</body>
</html>
