<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Match 3D - Cover</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .cover {
            width: 800px;
            height: 800px;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            position: relative;
            overflow: hidden;
        }
        
        /* Grid background - disabled */
        .grid {
            display: none;
        }
        
        /* Animated glow orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: pulse 4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }
        .orb-1 { 
            width: 300px; height: 300px; 
            background: rgba(255,0,255,0.6); 
            top: -50px; right: -50px;
            animation-delay: 0s;
        }
        .orb-2 { 
            width: 250px; height: 250px; 
            background: rgba(0,255,255,0.5); 
            bottom: -30px; left: -30px;
            animation-delay: 1s;
        }
        .orb-3 { 
            width: 200px; height: 200px; 
            background: rgba(191,0,255,0.5); 
            top: 40%; left: 30%;
            animation-delay: 2s;
        }
        
        /* Content */
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        
        /* Balls with glow - 3 balls triangle layout, wider spacing */
        .balls {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 50px;
            position: relative;
            height: 320px;
            width: 500px;
        }
        
        .ball {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            position: absolute;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .ball-red {
            background: radial-gradient(circle at 35% 35%, #ff4d6d, #cc0033);
            box-shadow: 
                0 0 40px rgba(255,77,109,0.8),
                0 0 80px rgba(255,77,109,0.5),
                inset -8px -8px 20px rgba(0,0,0,0.4),
                inset 8px 8px 20px rgba(255,255,255,0.3);
            animation: float 3s ease-in-out infinite;
            animation-delay: 0s;
            top: 0;
            left: 50%;
            margin-left: -60px;
        }
        
        .ball-blue {
            background: radial-gradient(circle at 35% 35%, #4de1ff, #0066cc);
            box-shadow: 
                0 0 40px rgba(77,225,255,0.8),
                0 0 80px rgba(77,225,255,0.5),
                inset -8px -8px 20px rgba(0,0,0,0.4),
                inset 8px 8px 20px rgba(255,255,255,0.3);
            animation: float 3s ease-in-out infinite;
            animation-delay: 0.5s;
            bottom: 0;
            left: 5%;
        }
        
        .ball-yellow {
            background: radial-gradient(circle at 35% 35%, #ffff4d, #cccc00);
            box-shadow: 
                0 0 40px rgba(255,255,77,0.8),
                0 0 80px rgba(255,255,77,0.5),
                inset -8px -8px 20px rgba(0,0,0,0.4),
                inset 8px 8px 20px rgba(255,255,255,0.3);
            animation: float 3s ease-in-out infinite;
            animation-delay: 1s;
            bottom: 0;
            right: 5%;
        }
        
        /* Title with neon glow */
        .title-main {
            font-size: 85px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 
                0 0 10px #ff00ff,
                0 0 20px #ff00ff,
                0 0 40px #ff00ff,
                0 0 80px #ff00ff;
            margin-bottom: 10px;
            font-family: 'Arial Black', sans-serif;
        }
        
        .title-sub {
            font-size: 40px;
            font-weight: 700;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff;
            margin-bottom: 30px;
            font-family: 'Arial Black', sans-serif;
        }
        
        .tagline {
            font-size: 24px;
            color: rgba(255,255,255,0.9);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-family: Arial, sans-serif;
        }
        
        /* Light strips */
        .light-strip {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff00ff, transparent);
            width: 500px;
            left: 50%;
            transform: translateX(-50%);
            animation: glow 2s ease-in-out infinite;
        }
        @keyframes glow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .strip-top { top: 80px; }
        .strip-bottom { bottom: 80px; }
    </style>
</head>
<body>
    <div class="cover">
        <div class="grid"></div>
        
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        
        <div class="light-strip strip-top"></div>
        
        <div class="content">
            <div class="balls">
                <div class="ball ball-red"></div>
                <div class="ball ball-blue"></div>
                <div class="ball ball-yellow"></div>
            </div>
            
            <div class="title-main">Ball Match</div>
            <div class="title-sub">3D</div>
            <div class="tagline">Match 3 to Win</div>
        </div>
        
        <div class="light-strip strip-bottom"></div>
    </div>
</body>
</html>
